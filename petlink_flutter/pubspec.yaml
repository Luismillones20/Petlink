name: petlink_flutter
description: Panel de control IoT para cuidado de mascotas (Migración a Flutter)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  lucide_icons_flutter: ^3.1.14
  provider: ^6.1.1
  google_fonts: ^8.1.0
  mqtt_client: ^10.3.0
  web_socket_channel: ^3.0.3
  record: ^7.0.0
  audioplayers: ^6.7.1
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
